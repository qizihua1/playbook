---
- name: 查看系统版本和服务器IP
  hosts: all
  gather_facts: yes
  tasks:
    - name: 显示服务器IP地址
      debug:
        msg: "服务器IP: {{ ansible_default_ipv4.address }}"

    - name: 显示主机名
      debug:
        msg: "主机名: {{ ansible_hostname }}"

    - name: 显示操作系统版本
      debug:
        msg: "系统版本: {{ ansible_distribution }} {{ ansible_distribution_version }}"

